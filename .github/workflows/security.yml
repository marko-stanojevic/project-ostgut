name: Security

on:
  schedule:
    # Weekly Monday 04:00 UTC — picks up newly disclosed CVEs even with no
    # code changes.
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    name: SBOM (SPDX JSON)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Install Syft
        run: go install github.com/anchore/syft/cmd/syft@v1.43.0
      - name: Generate SPDX SBOM
        run: |
          mkdir -p artifacts
          "$(go env GOPATH)/bin/syft" dir:. -o spdx-json=artifacts/ostgut-sbom.spdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-spdx-json
          path: artifacts/ostgut-sbom.spdx.json

  govulncheck:
    name: govulncheck (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          # Repo has a go.work at root, which makes setup-go's cache resolver
          # look for go.sum at the repo root and fail. Pin it to the real one.
          cache-dependency-path: backend/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: gosec (backend static analysis)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      # Gating run uses the default text formatter so findings are visible
      # in the Actions log when the job fails. Suppress per-line with a
      # `// #nosec G104 -- justification` comment if intentional.
      - name: Run gosec (gate)
        working-directory: backend
        run: gosec -severity medium ./...
      # Non-gating run produces a SARIF artifact for offline review.
      # `if: always()` so the artifact is preserved even when the gate fails.
      - name: Run gosec (SARIF artifact)
        if: always()
        working-directory: backend
        run: gosec -fmt sarif -out gosec.sarif -severity medium ./... || true
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gosec-sarif
          path: backend/gosec.sarif

  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies
        # Fails on high+ severity in runtime deps. Dev-only issues are
        # surfaced separately by Dependabot but do not block.
        run: npm audit --omit=dev --audit-level=high

  # ──────────────────────────────────────────────────────────────────────────
  # Container image vulnerability scanning. Trivy scans the multi-stage
  # output images for OS-level CVEs, vulnerable Go modules baked into the
  # binary, and known-bad npm packages bundled in the standalone Next.js
  # build. Fails on HIGH/CRITICAL.
  # ──────────────────────────────────────────────────────────────────────────
  trivy-backend:
    name: Trivy (backend image)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Build backend image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          tags: ostgut-backend:scan
      # Gating scan: table output so trivy-action passes severity/ignore-
      # unfixed through to the CLI. Job fails on HIGH/CRITICAL fixed CVEs.
      - name: Scan backend image (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ostgut-backend:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      # Separate non-gating SARIF run to keep an audit artifact. trivy-action
      # writes "all severities" SARIF when format=sarif+output is set; that's
      # by design — the file is for review, not for the gate.
      - name: Scan backend image (SARIF artifact)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ostgut-backend:scan
          format: sarif
          output: trivy-backend.sarif
          exit-code: "0"
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-backend-sarif
          path: trivy-backend.sarif

  trivy-frontend:
    name: Trivy (frontend image)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Build frontend image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: frontend
          file: frontend/Dockerfile
          load: true
          tags: ostgut-frontend:scan
          # Build args mirror the deploy workflow; values don't matter for
          # the scan but must be present or `next build` fails.
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080
      - name: Scan frontend image (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ostgut-frontend:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan frontend image (SARIF artifact)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ostgut-frontend:scan
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "0"
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-frontend-sarif
          path: trivy-frontend.sarif

  # Filesystem scan — catches vulnerable dependencies before they hit an
  # image (transitive npm + Go modules). Faster feedback than the image
  # scans above and runs even when Dockerfiles haven't changed.
  trivy-fs:
    name: Trivy (repository filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - name: Trivy fs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          skip-dirs: "node_modules,frontend/.next,backend/bin"
