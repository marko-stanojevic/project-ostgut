name: Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

# Prevent concurrent deployments to the same environment.
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

# Required for OIDC token request.
permissions:
  contents: read
  id-token: write

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 0. Detect which parts of the repo changed.
  #    On workflow_dispatch, all services are treated as changed.
  # ──────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Provision infrastructure
  # ──────────────────────────────────────────────────────────────────────────
  provision:
    name: Provision infrastructure (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    needs: changes
    environment: ${{ github.event.inputs.environment || 'staging' }}

    outputs:
      acr_login_server: ${{ steps.tofu-output.outputs.acr_login_server }}

    defaults:
      run:
        working-directory: infra

    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.9.x"

      - name: tofu init
        run: |
          tofu init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}.tfstate"

      - name: tofu apply (infrastructure only)
        run: |
          tofu apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="allowed_origins=${{ vars.ALLOWED_ORIGINS }}" \
            -var="api_url=${{ vars.API_URL }}" \
            -var="auth_url=${{ vars.FRONTEND_URL }}" \
            -var="auth_github_id=${{ secrets.AUTH_GITHUB_ID }}" \
            -var="auth_github_secret=${{ secrets.AUTH_GITHUB_SECRET }}" \
            -var="paddle_api_key=${{ secrets.PADDLE_API_KEY }}" \
            -var="paddle_webhook_secret=${{ secrets.PADDLE_WEBHOOK_SECRET }}" \
            -var="paddle_client_token=${{ vars.PADDLE_CLIENT_TOKEN }}" \
            -var="paddle_price_id=${{ vars.PADDLE_PRICE_ID }}" \
            -var="backend_custom_domain=${{ vars.BACKEND_CUSTOM_DOMAIN }}" \
            -var="frontend_custom_domain=${{ vars.FRONTEND_CUSTOM_DOMAIN }}" \
            -target=azurerm_resource_group.main \
            -target=azurerm_postgresql_flexible_server.main \
            -target=azurerm_postgresql_flexible_server_database.main \
            -target=azurerm_postgresql_flexible_server_firewall_rule.azure_services \
            -target=azurerm_container_registry.main \
            -target=azurerm_log_analytics_workspace.main \
            -target=azurerm_user_assigned_identity.backend \
            -target=azurerm_role_assignment.acr_pull \
            -target=azurerm_user_assigned_identity.frontend \
            -target=azurerm_role_assignment.acr_pull_frontend

      - name: Read tofu outputs
        id: tofu-output
        run: |
          echo "acr_login_server=$(tofu output -raw container_registry_login_server)" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build & push Docker images
  #    Only builds images for services that changed.
  #    For unchanged services, fetches the current running image tag from Azure
  #    so the deploy step can pass it through without triggering a redeploy.
  # ──────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [changes, provision]
    environment: ${{ github.event.inputs.environment || 'staging' }}

    outputs:
      backend_image_tag: ${{ steps.backend-tag.outputs.tag }}
      frontend_image_tag: ${{ steps.frontend-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4
        with:
          useConfigFile: true

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: |
          REGISTRY="${{ needs.provision.outputs.acr_login_server }}"
          az acr login --name "${REGISTRY%%.*}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Determine backend image tag
        id: backend-tag
        run: |
          FORCE="${{ github.event_name == 'workflow_dispatch' }}"
          CHANGED="${{ needs.changes.outputs.backend }}"
          if [[ "$FORCE" == "true" || "$CHANGED" == "true" ]]; then
            echo "tag=${{ steps.gitversion.outputs.semVer }}" >> "$GITHUB_OUTPUT"
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            CURRENT=$(az containerapp show \
              --name "ca-ostgut-${{ env.ENVIRONMENT }}-backend" \
              --resource-group "rg-ostgut-${{ env.ENVIRONMENT }}" \
              --query "properties.template.containers[0].image" -o tsv 2>/dev/null || echo ":latest")
            echo "tag=${CURRENT##*:}" >> "$GITHUB_OUTPUT"
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push backend
        if: steps.backend-tag.outputs.build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ needs.provision.outputs.acr_login_server }}/backend:${{ steps.backend-tag.outputs.tag }}
            ${{ needs.provision.outputs.acr_login_server }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Determine frontend image tag
        id: frontend-tag
        run: |
          FORCE="${{ github.event_name == 'workflow_dispatch' }}"
          CHANGED="${{ needs.changes.outputs.frontend }}"
          if [[ "$FORCE" == "true" || "$CHANGED" == "true" ]]; then
            echo "tag=${{ steps.gitversion.outputs.semVer }}" >> "$GITHUB_OUTPUT"
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            CURRENT=$(az containerapp show \
              --name "ca-ostgut-${{ env.ENVIRONMENT }}-frontend" \
              --resource-group "rg-ostgut-${{ env.ENVIRONMENT }}" \
              --query "properties.template.containers[0].image" -o tsv 2>/dev/null || echo ":latest")
            echo "tag=${CURRENT##*:}" >> "$GITHUB_OUTPUT"
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push frontend
        if: steps.frontend-tag.outputs.build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ needs.provision.outputs.acr_login_server }}/frontend:${{ steps.frontend-tag.outputs.tag }}
            ${{ needs.provision.outputs.acr_login_server }}/frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Update container apps with the resolved image tags
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    needs: build-push
    environment: ${{ github.event.inputs.environment || 'staging' }}

    defaults:
      run:
        working-directory: infra

    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.9.x"

      - name: tofu init
        run: |
          tofu init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}.tfstate"

      - name: tofu apply
        run: |
          tofu apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="allowed_origins=${{ vars.ALLOWED_ORIGINS }}" \
            -var="api_url=${{ vars.API_URL }}" \
            -var="auth_url=${{ vars.FRONTEND_URL }}" \
            -var="auth_github_id=${{ secrets.AUTH_GITHUB_ID }}" \
            -var="auth_github_secret=${{ secrets.AUTH_GITHUB_SECRET }}" \
            -var="backend_image_tag=${{ needs.build-push.outputs.backend_image_tag }}" \
            -var="frontend_image_tag=${{ needs.build-push.outputs.frontend_image_tag }}" \
            -var="paddle_api_key=${{ secrets.PADDLE_API_KEY }}" \
            -var="paddle_webhook_secret=${{ secrets.PADDLE_WEBHOOK_SECRET }}" \
            -var="paddle_client_token=${{ vars.PADDLE_CLIENT_TOKEN }}" \
            -var="paddle_price_id=${{ vars.PADDLE_PRICE_ID }}" \
            -var="backend_custom_domain=${{ vars.BACKEND_CUSTOM_DOMAIN }}" \
            -var="frontend_custom_domain=${{ vars.FRONTEND_CUSTOM_DOMAIN }}"
