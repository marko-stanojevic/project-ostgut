name: Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

# Prevent concurrent deployments to the same environment.
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

# Required for OIDC token request.
permissions:
  contents: read
  id-token: write

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Provision infrastructure
  #    Runs tofu apply to ensure all Azure resources exist (VNet, DB, ACR, etc.).
  #    Uses "latest" as a placeholder image tag — the container app may be in a
  #    degraded state until job 3 updates it with the real tag, which is fine.
  #    Outputs the ACR login server so job 2 can push images without needing
  #    a separately configured GitHub variable.
  # ──────────────────────────────────────────────────────────────────────────
  provision:
    name: Provision infrastructure (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    outputs:
      acr_login_server: ${{ steps.tofu-output.outputs.acr_login_server }}

    defaults:
      run:
        working-directory: infra

    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.9.x"

      - name: tofu init
        run: |
          tofu init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}.tfstate"

      - name: tofu apply (infrastructure only)
        run: |
          tofu apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="allowed_origins=${{ vars.ALLOWED_ORIGINS }}" \
            -var="api_url=${{ vars.API_URL }}" \
            -var="auth_url=${{ vars.FRONTEND_URL }}" \
            -var="auth_github_id=${{ secrets.AUTH_GITHUB_ID }}" \
            -var="auth_github_secret=${{ secrets.AUTH_GITHUB_SECRET }}" \
            -target=azurerm_resource_group.main \
            -target=azurerm_postgresql_flexible_server.main \
            -target=azurerm_postgresql_flexible_server_database.main \
            -target=azurerm_postgresql_flexible_server_firewall_rule.azure_services \
            -target=azurerm_container_registry.main \
            -target=azurerm_log_analytics_workspace.main \
            -target=azurerm_container_app_environment.main \
            -target=azurerm_user_assigned_identity.backend \
            -target=azurerm_role_assignment.acr_pull \
            -target=azurerm_user_assigned_identity.frontend \
            -target=azurerm_role_assignment.acr_pull_frontend

      - name: Read tofu outputs
        id: tofu-output
        run: |
          echo "acr_login_server=$(tofu output -raw container_registry_login_server)" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build & push Docker images to ACR
  #    ACR login server comes from the provision job — no GitHub variable needed.
  # ──────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: provision
    environment: ${{ github.event.inputs.environment || 'staging' }}

    outputs:
      backend_image_tag: ${{ steps.meta-backend.outputs.version }}
      frontend_image_tag: ${{ steps.meta-frontend.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: |
          REGISTRY="${{ needs.provision.outputs.acr_login_server }}"
          az acr login --name "${REGISTRY%%.*}"

      - name: Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.provision.outputs.acr_login_server }}/backend
          tags: |
            type=raw,value=${{ steps.gitversion.outputs.semVer }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.provision.outputs.acr_login_server }}/frontend
          tags: |
            type=raw,value=${{ steps.gitversion.outputs.semVer }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Update container app with the real image tags
  #    Second tofu apply is fast — only the container app image tag changes.
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    needs: build-push
    environment: ${{ github.event.inputs.environment || 'staging' }}

    defaults:
      run:
        working-directory: infra

    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.9.x"

      - name: tofu init
        run: |
          tofu init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}.tfstate"

      - name: tofu apply
        run: |
          tofu apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="allowed_origins=${{ vars.ALLOWED_ORIGINS }}" \
            -var="api_url=${{ vars.API_URL }}" \
            -var="auth_url=${{ vars.FRONTEND_URL }}" \
            -var="auth_github_id=${{ secrets.AUTH_GITHUB_ID }}" \
            -var="auth_github_secret=${{ secrets.AUTH_GITHUB_SECRET }}" \
            -var="backend_image_tag=${{ needs.build-push.outputs.backend_image_tag }}" \
            -var="frontend_image_tag=${{ needs.build-push.outputs.frontend_image_tag }}"
