name: Deploy

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      force_frontend_build:
        description: "Force frontend image rebuild even when no frontend changes are
          detected"
        required: false
        default: false
        type: boolean
      force_backend_build:
        description: "Force backend image rebuild even when no backend changes are detected"
        required: false
        default: false
        type: boolean

# Prevent concurrent deployments to the same environment.
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

# Required for OIDC token request.
permissions:
  contents: read
  id-token: write

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
  COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 0. Detect which parts of the repo changed.
  #    Manual workflow runs do NOT force builds by default.
  #    Use force_backend_build / force_frontend_build for explicit overrides.
  # ──────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      backend: ${{ steps.detect.outputs.backend || steps.initial.outputs.backend || steps.manual.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend || steps.initial.outputs.frontend || steps.manual.outputs.frontend }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          fetch-depth: 0
          fetch-tags: false
          ref: ${{ env.COMMIT_SHA }}

      - name: Set manual defaults
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: |
          echo "backend=false" >> "$GITHUB_OUTPUT"
          echo "frontend=false" >> "$GITHUB_OUTPUT"

      - name: Resolve workflow_run diff range
        if: github.event_name == 'workflow_run'
        id: range
        run: |
          if git rev-parse --verify "${COMMIT_SHA}^" >/dev/null 2>&1; then
            echo "base=${COMMIT_SHA}^" >> "$GITHUB_OUTPUT"
            echo "head=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
            echo "has_parent=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_parent=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark all services changed for initial commit
        if: github.event_name == 'workflow_run' && steps.range.outputs.has_parent == 'false'
        id: initial
        run: |
          echo "backend=true" >> "$GITHUB_OUTPUT"
          echo "frontend=true" >> "$GITHUB_OUTPUT"

      - name: Detect changed paths
        if: github.event_name == 'workflow_run' && steps.range.outputs.has_parent == 'true'
        id: detect
        run: |
          CHANGED_FILES="$(git diff --name-only "${{ steps.range.outputs.base }}" "${{ steps.range.outputs.head }}")"

          if echo "$CHANGED_FILES" | grep -qE '^backend/'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '^frontend/'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Provision infrastructure
  # ──────────────────────────────────────────────────────────────────────────
  provision:
    name: Provision infrastructure (${{ github.event.inputs.environment || 'staging'
      }})
    runs-on: ubuntu-latest
    needs: changes
    environment: ${{ github.event.inputs.environment || 'staging' }}

    outputs:
      acr_login_server: ${{ steps.tofu-output.outputs.acr_login_server }}

    defaults:
      run:
        working-directory: infra

    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2
        with:
          tofu_version: "1.9.x"

      - name: tofu init
        run: |
          tofu init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}.tfstate"

      - name: tofu apply (infrastructure only)
        run: |
          tofu apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="auth_secret=${{ secrets.AUTH_SECRET }}" \
            -var="oauth_shared_secret=${{ secrets.OAUTH_SHARED_SECRET }}" \
            -var="allowed_origins=${{ vars.ALLOWED_ORIGINS }}" \
            -var="api_url=${{ vars.API_URL }}" \
            -var="auth_url=${{ vars.FRONTEND_URL }}" \
            -var="auth_github_id=${{ secrets.AUTH_GITHUB_ID }}" \
            -var="auth_github_secret=${{ secrets.AUTH_GITHUB_SECRET }}" \
            -var="paddle_api_key=${{ secrets.PADDLE_API_KEY }}" \
            -var="paddle_webhook_secret=${{ secrets.PADDLE_WEBHOOK_SECRET }}" \
            -var="paddle_client_token=${{ vars.PADDLE_CLIENT_TOKEN }}" \
            -var="paddle_price_id=${{ vars.PADDLE_PRICE_ID }}" \
            -var="backend_custom_domain=${{ vars.BACKEND_CUSTOM_DOMAIN }}" \
            -var="frontend_custom_domain=${{ vars.FRONTEND_CUSTOM_DOMAIN }}" \
            -var="new_relic_license_key=${{ secrets.NEW_RELIC_LICENSE_KEY }}" \
            -var="new_relic_app_name=${{ vars.NEW_RELIC_APP_NAME || 'ostgut-backend-staging' }}" \
            -target=azurerm_resource_group.main \
            -target=azurerm_postgresql_flexible_server.main \
            -target=azurerm_postgresql_flexible_server_database.main \
            -target=azurerm_postgresql_flexible_server_firewall_rule.azure_services \
            -target=azurerm_container_registry.main \
            -target=azurerm_log_analytics_workspace.main \
            -target=azurerm_user_assigned_identity.backend \
            -target=azurerm_role_assignment.acr_pull \
            -target=azurerm_user_assigned_identity.frontend \
            -target=azurerm_role_assignment.acr_pull_frontend

      - name: Read tofu outputs
        id: tofu-output
        run: |
          echo "acr_login_server=$(tofu output -raw container_registry_login_server)" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build & push Docker images
  #    Only builds images for services that changed.
  #    For unchanged services, fetches the current running image tag from Azure
  #    so the deploy step can pass it through without triggering a redeploy.
  # ──────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [ changes, provision ]
    environment: ${{ github.event.inputs.environment || 'staging' }}

    outputs:
      backend_image_tag: ${{ steps.backend-tag.outputs.deploy_tag }}
      frontend_image_tag: ${{ steps.frontend-tag.outputs.deploy_tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          versionSpec: "6.x"

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: |
          REGISTRY="${{ needs.provision.outputs.acr_login_server }}"
          az acr login --name "${REGISTRY%%.*}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Determine backend image tag
        id: backend-tag
        run: |
          FORCE_BACKEND="${{ github.event.inputs.force_backend_build || 'false' }}"
          CHANGED="${{ needs.changes.outputs.backend }}"
          if [[ "$FORCE_BACKEND" == "true" || "$CHANGED" == "true" ]]; then
            SEMVER_TAG="${{ steps.gitversion.outputs.semVer }}"
            IMMUTABLE_TAG="${SEMVER_TAG}-${COMMIT_SHA::7}"
            echo "deploy_tag=${IMMUTABLE_TAG}" >> "$GITHUB_OUTPUT"
            echo "semver_tag=${SEMVER_TAG}" >> "$GITHUB_OUTPUT"
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            CURRENT=$(az containerapp show \
              --name "ca-ostgut-${{ env.ENVIRONMENT }}-backend" \
              --resource-group "rg-ostgut-${{ env.ENVIRONMENT }}" \
              --query "properties.template.containers[0].image" -o tsv 2>/dev/null || echo ":latest")
            echo "deploy_tag=${CURRENT##*:}" >> "$GITHUB_OUTPUT"
            echo "semver_tag=${CURRENT##*:}" >> "$GITHUB_OUTPUT"
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push backend
        if: steps.backend-tag.outputs.build == 'true'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ needs.provision.outputs.acr_login_server }}/backend:${{ steps.backend-tag.outputs.deploy_tag }}
            ${{ needs.provision.outputs.acr_login_server }}/backend:${{ steps.backend-tag.outputs.semver_tag }}
            ${{ needs.provision.outputs.acr_login_server }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Determine frontend image tag
        id: frontend-tag
        run: |
          FORCE_FRONTEND="${{ github.event.inputs.force_frontend_build || 'false' }}"
          CHANGED="${{ needs.changes.outputs.frontend }}"
          if [[ "$FORCE_FRONTEND" == "true" || "$CHANGED" == "true" ]]; then
            SEMVER_TAG="${{ steps.gitversion.outputs.semVer }}"
            IMMUTABLE_TAG="${SEMVER_TAG}-${COMMIT_SHA::7}"
            echo "deploy_tag=${IMMUTABLE_TAG}" >> "$GITHUB_OUTPUT"
            echo "semver_tag=${SEMVER_TAG}" >> "$GITHUB_OUTPUT"
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            CURRENT=$(az containerapp show \
              --name "ca-ostgut-${{ env.ENVIRONMENT }}-frontend" \
              --resource-group "rg-ostgut-${{ env.ENVIRONMENT }}" \
              --query "properties.template.containers[0].image" -o tsv 2>/dev/null || echo ":latest")
            echo "deploy_tag=${CURRENT##*:}" >> "$GITHUB_OUTPUT"
            echo "semver_tag=${CURRENT##*:}" >> "$GITHUB_OUTPUT"
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push frontend
        if: steps.frontend-tag.outputs.build == 'true'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ needs.provision.outputs.acr_login_server }}/frontend:${{ steps.frontend-tag.outputs.deploy_tag }}
            ${{ needs.provision.outputs.acr_login_server }}/frontend:${{ steps.frontend-tag.outputs.semver_tag }}
            ${{ needs.provision.outputs.acr_login_server }}/frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_NEW_RELIC_ACCOUNT_ID=${{ vars.NEXT_PUBLIC_NEW_RELIC_ACCOUNT_ID }}
            NEXT_PUBLIC_NEW_RELIC_APPLICATION_ID=${{ vars.NEXT_PUBLIC_NEW_RELIC_APPLICATION_ID }}
            NEXT_PUBLIC_NEW_RELIC_LICENSE_KEY=${{ secrets.NEW_RELIC_LICENSE_KEY }}
            NEXT_PUBLIC_NEW_RELIC_TRUST_KEY=${{ vars.NEXT_PUBLIC_NEW_RELIC_TRUST_KEY }}
            NEXT_PUBLIC_NEW_RELIC_AGENT_ID=${{ vars.NEXT_PUBLIC_NEW_RELIC_AGENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Update container apps with the resolved image tags
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    needs: build-push
    environment: ${{ github.event.inputs.environment || 'staging' }}

    defaults:
      run:
        working-directory: infra

    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2
        with:
          tofu_version: "1.9.x"

      - name: tofu init
        run: |
          tofu init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}.tfstate"

      - name: tofu apply
        run: |
          tofu apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="auth_secret=${{ secrets.AUTH_SECRET }}" \
            -var="oauth_shared_secret=${{ secrets.OAUTH_SHARED_SECRET }}" \
            -var="allowed_origins=${{ vars.ALLOWED_ORIGINS }}" \
            -var="api_url=${{ vars.API_URL }}" \
            -var="auth_url=${{ vars.FRONTEND_URL }}" \
            -var="auth_github_id=${{ secrets.AUTH_GITHUB_ID }}" \
            -var="auth_github_secret=${{ secrets.AUTH_GITHUB_SECRET }}" \
            -var="backend_image_tag=${{ needs.build-push.outputs.backend_image_tag }}" \
            -var="frontend_image_tag=${{ needs.build-push.outputs.frontend_image_tag }}" \
            -var="paddle_api_key=${{ secrets.PADDLE_API_KEY }}" \
            -var="paddle_webhook_secret=${{ secrets.PADDLE_WEBHOOK_SECRET }}" \
            -var="paddle_client_token=${{ vars.PADDLE_CLIENT_TOKEN }}" \
            -var="paddle_price_id=${{ vars.PADDLE_PRICE_ID }}" \
            -var="backend_custom_domain=${{ vars.BACKEND_CUSTOM_DOMAIN }}" \
            -var="frontend_custom_domain=${{ vars.FRONTEND_CUSTOM_DOMAIN }}" \
            -var="new_relic_license_key=${{ secrets.NEW_RELIC_LICENSE_KEY }}" \
            -var="new_relic_app_name=${{ vars.NEW_RELIC_APP_NAME || 'project-ostgut-backend' }}"
