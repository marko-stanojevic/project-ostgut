name: Release

on:
  workflow_dispatch:
    inputs:
      confirm_production_release:
        description: "Type yes to create a production release"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  release:
    name: Create Production GitHub Release
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.confirm_production_release == 'yes' }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure release is cut from main
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Production releases must be created from main. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: "6.x"

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4

      - name: Check if tag already exists
        id: tag-check
        run: |
          TAG="v${{ steps.gitversion.outputs.semVer }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists, skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag-check.outputs.tag }}"
          git push origin "${{ steps.tag-check.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag-check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag-check.outputs.tag }}
          name: ${{ steps.tag-check.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.gitversion.outputs.preReleaseTag != '' }}
