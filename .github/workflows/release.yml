name: Release

on:
  workflow_dispatch:
    inputs:
      confirm_production_release:
        description: "Type yes to create a production release"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  release:
    name: Create Production GitHub Release
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.confirm_production_release == 'yes' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          fetch-depth: 0

      - name: Ensure release is cut from main
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Production releases must be created from main. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          versionSpec: "6.x"

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0

      - name: Check if tag already exists
        id: tag-check
        run: |
          TAG="v${{ steps.gitversion.outputs.majorMinorPatch }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists, skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.tag-check.outputs.exists == 'false'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install Syft
        if: steps.tag-check.outputs.exists == 'false'
        run: go install github.com/anchore/syft/cmd/syft@v1.43.0

      - name: Generate release SBOM
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          "$(go env GOPATH)/bin/syft" dir:. -o spdx-json=ostgut-${{ steps.tag-check.outputs.tag }}-sbom.spdx.json

      - name: Create tag
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag-check.outputs.tag }}"
          git push origin "${{ steps.tag-check.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag-check.outputs.exists == 'false'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag-check.outputs.tag }}
          name: ${{ steps.tag-check.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.gitversion.outputs.preReleaseTag != '' }}
          files: ostgut-${{ steps.tag-check.outputs.tag }}-sbom.spdx.json
