name: CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "backend/**"
      - "docs/operations/editorial-sync.md"
      - "frontend/**"
      - "infra/**"
      - "GitVersion.yml"
      - "scripts/**"

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend – essential PR checks only
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          # Repo has a go.work at root, which makes setup-go's cache resolver
          # look for go.sum at the repo root and fail. Pin it to the real one.
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Check editorial scripts syntax
        run: bash -n ../scripts/sync-editorial.sh ../scripts/export-and-upload-editorial.sh

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build -o ./bin/api ./cmd/api

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend – essential PR checks only
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          AUTH_SECRET: ci-build-secret-not-for-production

  # ──────────────────────────────────────────────────────────────────────────
  # Infrastructure – validate OpenTofu config
  # ──────────────────────────────────────────────────────────────────────────
  infra-validate:
    name: OpenTofu validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2
        with:
          tofu_version: "1.9.x"

      - name: tofu fmt check
        run: tofu fmt -check -recursive

      - name: tofu init (no backend)
        run: tofu init -backend=false

      - name: tofu validate
        run: tofu validate
