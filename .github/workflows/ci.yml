name: CI

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "backend/**"
      - "docs/sync-editorial.md"
      - "frontend/**"
      - "infra/**"
      - "GitVersion.yml"
      - "scripts/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "backend/**"
      - "docs/sync-editorial.md"
      - "frontend/**"
      - "infra/**"
      - "GitVersion.yml"
      - "scripts/**"

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend – build, vet and test
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check editorial scripts syntax
        run: bash -n ../scripts/sync-editorial.sh ../scripts/export-and-upload-editorial.sh

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: backend/coverage.out

  # ──────────────────────────────────────────────────────────────────────────
  # Backend – Docker image build (no push, validates multi-stage Dockerfile)
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build (backend)
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend – lint and build
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          AUTH_SECRET: ci-build-secret-not-for-production

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend – Docker image build (no push, validates multi-stage Dockerfile)
  # ──────────────────────────────────────────────────────────────────────────
  frontend-docker-build:
    name: Docker build (frontend)
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080
            AUTH_SECRET=ci-build-secret-not-for-production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Infrastructure – validate OpenTofu config
  # ──────────────────────────────────────────────────────────────────────────
  infra-validate:
    name: OpenTofu validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2
        with:
          tofu_version: "1.9.x"

      - name: tofu fmt check
        run: tofu fmt -check -recursive

      - name: tofu init (no backend)
        run: tofu init -backend=false

      - name: tofu validate
        run: tofu validate
