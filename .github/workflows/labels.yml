run-name: Sync label colors
name: Labels

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync-label-colors:
    name: Sync label colors
    runs-on: ubuntu-latest

    steps:
      - name: Create/update labels
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const labels = {
              backend: { color: '1D76DB', description: 'Changes in backend service' },
              frontend: { color: '0E8A16', description: 'Changes in frontend app' },
              infrastructure: { color: '5319E7', description: 'Infrastructure or IaC changes' },
              ci: { color: 'FBCA04', description: 'CI/CD and workflow changes' },
              documentation: { color: '0075CA', description: 'Documentation changes' },
              dependencies: { color: 'D93F0B', description: 'Dependency updates' },
            }

            for (const [name, { color, description }] of Object.entries(labels)) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                })

                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color,
                  description,
                })
              } catch (error) {
                if (error.status !== 404) throw error

                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color,
                  description,
                })
              }
            }
